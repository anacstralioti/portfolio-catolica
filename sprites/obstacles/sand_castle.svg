<svg xmlns="http://www.w3.org/2000/svg" width="80" height="64" viewBox="0 0 80 64">
  <!-- Fosso com água (bucket mechanic) -->
  <ellipse cx="40" cy="60" rx="34" ry="4" fill="#5a9ec8" opacity="0.55"/>
  <!-- Base do castelo -->
  <rect x="8"  y="44" width="64" height="16" fill="#c8a84a"/>
  <rect x="4"  y="48" width="72" height="10" rx="1" fill="#d8b85a"/>
  <!-- Torre esquerda -->
  <rect x="8"  y="30" width="18" height="18" fill="#bfa040"/>
  <rect x="10" y="32" width="14" height="14" fill="#cdb050"/>
  <!-- Amêias torre esquerda -->
  <rect x="8"  y="24" width="5" height="8" fill="#bfa040"/>
  <rect x="15" y="24" width="5" height="8" fill="#bfa040"/>
  <rect x="22" y="24" width="4" height="8" fill="#bfa040"/>
  <!-- Torre direita -->
  <rect x="54" y="30" width="18" height="18" fill="#bfa040"/>
  <rect x="56" y="32" width="14" height="14" fill="#cdb050"/>
  <!-- Amêias torre direita -->
  <rect x="54" y="24" width="5" height="8" fill="#bfa040"/>
  <rect x="61" y="24" width="5" height="8" fill="#bfa040"/>
  <rect x="68" y="24" width="4" height="8" fill="#bfa040"/>
  <!-- Torre central -->
  <rect x="26" y="18" width="28" height="30" fill="#c8aa4e"/>
  <rect x="28" y="20" width="24" height="26" fill="#d8ba5e"/>
  <!-- Amêias torre central -->
  <rect x="26" y="10" width="6" height="10" fill="#c8aa4e"/>
  <rect x="34" y="10" width="6" height="10" fill="#c8aa4e"/>
  <rect x="42" y="10" width="6" height="10" fill="#c8aa4e"/>
  <rect x="50" y="10" width="4" height="10" fill="#c8aa4e"/>
  <!-- Porta -->
  <rect x="35" y="32" width="10" height="14" rx="1" fill="#8a6a20"/>
  <!-- Janelas -->
  <rect x="13" y="33" width="8"  height="6" rx="1" fill="#8a6a20"/>
  <rect x="59" y="33" width="8"  height="6" rx="1" fill="#8a6a20"/>
  <rect x="30" y="23" width="7"  height="5" rx="1" fill="#8a6a20"/>
  <rect x="43" y="23" width="7"  height="5" rx="1" fill="#8a6a20"/>
  <!-- Bandeira -->
  <rect x="40" y="2" width="2" height="10" fill="#7a5a18"/>
  <polygon points="42,2 50,6 42,10" fill="#d84040"/>
  <!-- Detalhe de textura na areia -->
  <rect x="16" y="50" width="48" height="2" fill="#c09838" opacity="0.4"/>
</svg>
