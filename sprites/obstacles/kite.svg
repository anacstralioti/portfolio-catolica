<svg xmlns="http://www.w3.org/2000/svg" width="80" height="96">
  <!-- Corpo da pipa - quadrante superior esquerdo (amarelo) -->
  <rect x="8" y="8"  width="32" height="32" fill="#f0c020"/>
  <!-- Corpo da pipa - quadrante superior direito (vermelho) -->
  <rect x="40" y="8"  width="32" height="32" fill="#d03020"/>
  <!-- Corpo da pipa - quadrante inferior esquerdo (vermelho escuro) -->
  <rect x="8" y="40"  width="32" height="32" fill="#a82018"/>
  <!-- Corpo da pipa - quadrante inferior direito (laranja) -->
  <rect x="40" y="40"  width="32" height="32" fill="#e07028"/>
  <!-- Varetas centrais (cruzadas) -->
  <rect x="38" y="8"  width="4" height="64" fill="#5a3a1a"/>
  <rect x="8"  y="38" width="64" height="4" fill="#5a3a1a"/>
  <!-- Extremidades da pipa -->
  <rect x="38" y="4"  width="4" height="6" fill="#c8a050"/>
  <rect x="38" y="70" width="4" height="6" fill="#c8a050"/>
  <rect x="4"  y="38" width="6" height="4" fill="#c8a050"/>
  <rect x="70" y="38" width="6" height="4" fill="#c8a050"/>
  <!-- Cauda: cordão + fitinhas -->
  <rect x="40" y="72" width="2" height="8"  fill="#8b6040"/>
  <rect x="38" y="78" width="2" height="8"  fill="#8b6040"/>
  <rect x="36" y="84" width="2" height="8"  fill="#8b6040"/>
  <!-- Fitinhas coloridas -->
  <rect x="40" y="74" width="10" height="4" fill="#d03020"/>
  <rect x="36" y="82" width="10" height="4" fill="#f0c020"/>
  <rect x="32" y="88" width="10" height="4" fill="#208030"/>
</svg>
